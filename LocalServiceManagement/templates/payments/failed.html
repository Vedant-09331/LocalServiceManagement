{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-times-circle"></i> Payment Failed
                    </h4>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-times-circle text-danger" style="font-size: 4rem;"></i>
                    </div>

                    <h5 class="text-danger mb-3">Your payment could not be processed.</h5>

                    <p class="text-muted mb-4">
                        There was an issue processing your payment. Please try again or contact support if the problem persists.
                    </p>

                    <div class="mt-4">
                        <a href="{% url 'core:home' %}" class="btn btn-primary me-2">Back to Home</a>
                        <a href="{% url 'bookings:my_bookings' %}" class="btn btn-outline-secondary">View My Bookings</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
