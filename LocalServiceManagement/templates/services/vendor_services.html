<h1>My Services</h1>
<a href="{% url 'add_service' %}">Add New Service</a>
{% for service in services %}
  <div>
    <h3>{{ service.name }}</h3>
    <p>{{ service.description }}</p>
    <p>Price: ₹{{ service.price }}</p>
    {% if service.image %}<img src="{{ service.image.url }}" width="100">{% endif %}
    <a href="{% url 'edit_service' service.id %}">Edit</a>
    <a href="{% url 'delete_service' service.id %}">Delete</a>
  </div>
{% empty %}
  <p>You have not added any services yet.</p>
{% endfor %}
