{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg border-0">
        <div class="card-body text-center">
            <h2 class="mb-3">👤 User Dashboard</h2>
            <p class="text-muted">Welcome, {{ request.user.email }}</p>
            <p>Your Role: <strong>{{ request.user.role }}</strong></p>

            <hr>

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h5>My Profile</h5>
                        <p>View and update your details</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h5>My Services</h5>
                        <p>Track booked services</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h5>Settings</h5>
                        <p>Manage account settings</p>
                    </div>
                </div>
            </div>

            <a href="{% url 'logout' %}" class="btn btn-danger mt-4">Logout</a>
        </div>
    </div>
</div>

</body>
</html>
