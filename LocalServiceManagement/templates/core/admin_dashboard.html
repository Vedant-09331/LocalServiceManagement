{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
    <div>
        <h2 class="fw-bold mb-1">Admin Dashboard</h2>
        <p class="text-muted mb-0">Welcome, {{ request.user.email }}</p>
    </div>
    <a href="{% url 'core:logout' %}" class="btn btn-outline-danger">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body">
                <h5 class="fw-bold mb-2">Users</h5>
                <p class="text-muted mb-0">Manage platform users and roles.</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body">
                <h5 class="fw-bold mb-2">Vendors</h5>
                <p class="text-muted mb-0">Approve and manage vendors.</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body">
                <h5 class="fw-bold mb-2">Reports</h5>
                <p class="text-muted mb-0">Track growth and system health.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
