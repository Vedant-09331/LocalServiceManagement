{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card shadow-lg border-0 bg-secondary text-white">
        <div class="card-body text-center">
            <h2 class="mb-3">👑 Admin Dashboard</h2>
            <p>Welcome, {{ request.user.email }}</p>
            <p>Your Role: <strong>{{ request.user.role }}</strong></p>

            <hr class="bg-light">

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card bg-light text-dark p-3 shadow-sm">
                        <h5>Total Users</h5>
                        <p>Manage all platform users</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light text-dark p-3 shadow-sm">
                        <h5>Vendors</h5>
                        <p>Approve & manage vendors</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light text-dark p-3 shadow-sm">
                        <h5>Reports</h5>
                        <p>View system reports</p>
                    </div>
                </div>
            </div>

            <a href="{% url 'logout' %}" class="btn btn-warning mt-4">Logout</a>
        </div>
    </div>
</div>

</body>
</html>
